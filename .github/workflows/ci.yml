name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  daml-build-test:
    name: DAML Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache DPM
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-${{ runner.os }}-3.4.0

      - name: Install DPM (Canton SDK 3.4)
        run: |
          curl -sSL https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Build DAML packages
        run: dpm build
        working-directory: daml

      - name: Run DAML test suite
        run: dpm test
        working-directory: daml

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        working-directory: backend

      - name: Run backend unit tests
        run: python -m pytest tests/ -v
        working-directory: backend

  sdk-build:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm install
        working-directory: sdk

      - name: Build SDK
        run: npm run build
        working-directory: sdk
